# ChapelBells Configuration
# Location: /opt/bells/config/schedule.yaml
#
# Schema used by scheduler.py:
#   audio_dir   – path to audio samples directory (relative to WorkingDirectory)
#   volume      – master volume 0-100
#   quiet_hours – suppress all bells between start and end (spans midnight if start > end)
#   bells[]     – list of scheduled bell events:
#                   time     HH:MM (24-hour, required)
#                   sound    path relative to audio_dir (required)
#                   count    number of rings (default 1)
#                   interval seconds between rings when count > 1 (default 2.0)

audio_dir: "audio_samples"
volume: 80

quiet_hours:
  enabled: true
  start: "21:00"   # 9 PM – silence begins
  end: "07:00"     # 7 AM – silence ends (spans midnight)

bells:
  # ── Morning bells ────────────────────────────────────────────────
  - time: "07:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "08:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "09:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  # 10 AM – full Westminster chimes peal (call to service)
  - time: "10:00"
    sound: "carillon-bells/westminster-chimes-full.mp3"
    count: 1
    interval: 2.0

  - time: "11:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  # ── Noon carillon hour strike ────────────────────────────────────
  - time: "12:00"
    sound: "carillon-bells/noon-hour-bell-strike.mp3"
    count: 1
    interval: 2.0

  # ── Afternoon bells ──────────────────────────────────────────────
  - time: "13:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "14:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "15:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "16:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "17:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  # 6 PM – evening carillon peal
  - time: "18:00"
    sound: "carillon-bells/carillon-peal.mp3"
    count: 1
    interval: 2.0

  - time: "19:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

  - time: "20:00"
    sound: "westminster/bell.wav"
    count: 1
    interval: 2.0

